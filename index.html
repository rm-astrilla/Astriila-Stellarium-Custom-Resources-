<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Astrilla VR - Taraju 360 Experience</title>
    <meta name="description" content="Custom Stellarium Resources by Raihan Mohammad">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      /* Memastikan tampilan penuh jika dibuka langsung di HP */
      body { margin: 0; overflow: hidden; }
      .ar-button {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 999;
        padding: 10px;
        background: rgba(0,0,0,0.5);
        color: white;
        border-radius: 5px;
        font-family: sans-serif;
        text-decoration: none;
      }
    </style>
  </head>
  <body>

    <a-scene loading-screen="dotsColor: white; backgroundColor: black" embedded>
      
      <a-assets>
        <img id="sky-taraju" src="https://rm-astrilla.github.io/Astrilla-Stellarium-Custom-Resources/mw_equi.jpg" crossorigin="anonymous">
      </a-assets>

      <a-sky src="#sky-taraju" rotation="0 -90 0" animation="property: rotation; to: 0 270 0; loop: true; dur: 100000; easing: linear">
      </a-sky>

      <a-entity camera look-controls></a-entity>

    </a-scene>

  </body>
</html>
